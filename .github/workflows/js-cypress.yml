name: JavaScript Cypress Tests

on:
  workflow_call:

jobs:
  js-cypress-tests:
    runs-on: ubuntu-latest

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: act10ns/slack@v2
        with:
          status: starting
          channel: "#workflows"
          message: "Starting JavaScript Cypress Tests"
        if: always()

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js environment
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Debug token
        run: echo ${{ secrets.EVINCED_NPM_TOKEN }}

      - name: Configure .npmrc
        run: |
          echo "@evinced:registry=https://evinced.jfrog.io/artifactory/api/npm/restricted-npm-local/" > ~/.npmrc
          echo "//evinced.jfrog.io/artifactory/api/npm/restricted-npm-local/:_authToken=${{ secrets.EVINCED_NPM_TOKEN }}" >> ~/.npmrc

      - name: Debug .npmrc
        run: cat ~/.npmrc

      - name: Install dependencies
        run: |
          cd js-cypress
          npm install --userconfig=~/.npmrc

      - name: Run Cypress Tests
        id: run-js-cypress-tests
        env:
          EVINCED_SERVICE_ID: ${{ secrets.EVINCED_SERVICE_ID }}
          EVINCED_API_KEY: ${{ secrets.EVINCED_API_KEY }}
        run: |
          cd js-cypress
          npx cypress run

      - uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: always()
